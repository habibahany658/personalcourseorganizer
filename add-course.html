<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" >
    <meta name="viewport" width="width-device", initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
<header>
    <h1>FCAIH-Course Organizer</h1>
</header>
<nav>
   <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html">My courses</a></li>
      <li><a href="add-course.html">Add course</a></li>
      <li><a href="contact.html">Contact</a></li>
   </ul>
</nav>

<main>
  <section>  
     <h3>Add Course</h3>
     <form>
         <label>Course Name:</label>
         <input type="text" placeholder="course name" required>

         <label>Instructor:</label>
         <input type="text" placeholder="instructor" required>
     
         <label>Credit Hours:</label>
         <select required>
             <option value="">Choose</option>
             <option>1</option>
             <option>2</option>
             <option>3</option>
             <option>4</option>
         </select>
    
        <label>Write your Notes:</label>
        <textarea placeholder="note"></textarea>

        <button type="submit">Add Course</button>
     </form>
  </section>
</main>


<footer>

</html>
